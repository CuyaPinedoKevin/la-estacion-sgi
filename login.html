<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Estación - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/general.css">
</head>
<body>
  <header>
    <!-- Se genera dinámicamente con js/app.js -->
  </header>

  <main style="max-width: 450px; margin: 50px auto;">
    <section class="tarjeta">
      <h2 style="text-align: center; margin-bottom: 20px;">Iniciar Sesión</h2>
      <form id="form-login">
        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input type="email" id="correo" required placeholder="correo@estacion.com">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <div id="mensaje-error" class="mensaje error" style="display: none;"></div>
        <button type="submit" style="width: 100%; margin-top: 10px;">Ingresar</button>
      </form>
      
      <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
        ¿No tienes una cuenta? <a href="registrar.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Regístrate aquí</a>
      </p>
    </section>
  </main>

  <footer>
    <!-- Se genera dinámicamente con js/app.js -->
  </footer>

  <script src="js/app.js"></script>
  <script>
    document.getElementById("form-login").addEventListener("submit", async (e) => {
      e.preventDefault();
      const correo = document.getElementById("correo").value;
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("mensaje-error");
      
      errorDiv.style.display = "none";
      
      try {
        const res = await enviarPeticion(`${API_BASE}/api/auth/login`, {
          method: "POST",
          body: JSON.stringify({ correo, password })
        });
        
      
        guardarUsuarioSesion(res.usuario);
        window.location.href = "dashboard.html";
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = "flex";
      }
    });
  </script>
</body>
</html>
